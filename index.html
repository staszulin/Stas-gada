<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Pro - GEDA Y.KEREN LTD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hanken Grotesk', system-ui, sans-serif; }
        .hub-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .hub-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-[#f7f9fb] min-h-screen">
    <div class="max-w-5xl mx-auto px-6 py-12">
        <div class="flex items-center justify-between mb-12">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-[#00288e] rounded-xl flex items-center justify-center">
                    <span class="text-white text-3xl">🚚</span>
                </div>
                <div>
                    <h1 class="text-4xl font-bold text-[#00288e]">Logistics Pro</h1>
                    <p class="text-[#444653]">גדא י.קרן בע"מ • מערכת לוגיסטיקה</p>
                </div>
            </div>
            <div class="text-right">
                <div class="inline-flex items-center gap-2 bg-white px-4 py-2 rounded-full border border-[#c4c5d5]">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-sm font-medium text-[#191c1e]">מערכת פעילה</span>
                </div>
            </div>
        </div>

        <h2 class="text-2xl font-semibold mb-6 text-[#191c1e]">בחר מסך להדגמה</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <a href="pages/agent-report.html" class="hub-card bg-white border border-[#e0e3e5] rounded-2xl p-6 block hover:border-[#00288e]">
                <div class="flex items-center gap-4 mb-4">
                    <div class="w-12 h-12 bg-[#dde1ff] rounded-xl flex items-center justify-center">
                        <span class="material-symbols-outlined text-[#00288e] text-3xl">person</span>
                    </div>
                    <div>
                        <h3 class="font-bold text-xl">דיווח סוכן</h3>
                        <p class="text-sm text-[#444653]">הזנת הזמנות בזמן אמת</p>
                    </div>
                </div>
            </a>

            <a href="pages/warehouse-sync.html" class="hub-card bg-white border border-[#e0e3e5] rounded-2xl p-6 block hover:border-[#00288e]">
                <div class="flex items-center gap-4 mb-4">
                    <div class="w-12 h-12 bg-[#ffdbca] rounded-xl flex items-center justify-center">
                        <span class="material-symbols-outlined text-[#9d4300] text-3xl">sync</span>
                    </div>
                    <div>
                        <h3 class="font-bold text-xl">סנכרון מחסן</h3>
                        <p class="text-sm text-[#444653]">ניהול הזמנות ממתינות</p>
                    </div>
                </div>
            </a>

            <!-- תוסיף עוד קישורים כשנעלה את שאר הדפים -->
        </div>

        <div class="mt-16 text-center text-sm text-[#444653]">
            <p>כל המסכים נבנו ב-Stitch • מוכנים לייצור</p>
            <p class="mt-1">עיצוב: סטס זולין</p>
        </div>
    </div>
</body>
</html>
