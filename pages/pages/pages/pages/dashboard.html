<!DOCTYPE html>
<html class="light" dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>לוח בקרה - גדא י.קרן</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#f7f9fb] min-h-screen pb-20">
<header class="fixed top-0 w-full bg-white border-b p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold text-[#00288e]">לוח בקרה</h1>
</header>

<main class="pt-20 px-4 max-w-5xl mx-auto">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="bg-white rounded-2xl p-6 shadow-sm">
      <p class="text-sm text-gray-500">זמן ליקוט ממוצע</p>
      <p class="text-4xl font-bold mt-2">12.4 דקות</p>
    </div>
    <div class="bg-white rounded-2xl p-6 shadow-sm">
      <p class="text-sm text-gray-500">עמידה ב-SLA</p>
      <p class="text-4xl font-bold mt-2 text-green-600">94%</p>
    </div>
    <div class="bg-white rounded-2xl p-6 shadow-sm">
      <p class="text-sm text-gray-500">ניצולת צי</p>
      <p class="text-4xl font-bold mt-2">82%</p>
    </div>
  </div>
</main>
</body>
</html>
