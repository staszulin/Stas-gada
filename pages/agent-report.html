<!DOCTYPE html>
<html class="light" dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>דיווח סוכן - גדא</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
</head>
<body class="min-h-screen flex flex-col pb-24 bg-[#f7f9fb]">
<header class="fixed top-0 w-full z-50 bg-white border-b p-4 flex justify-between">
  <div class="font-bold text-primary">גדה קבוצת לוגיסטיקה</div>
</header>

<main class="max-w-xl mx-auto px-4 py-20 space-y-6">
  <h2 class="text-2xl font-bold">דיווח סוכן חדש</h2>
  
  <div class="bg-white rounded-2xl p-6 shadow-sm">
    <label class="font-bold block mb-2">סוכן</label>
    <select class="w-full border rounded-xl p-4"> 
      <option>ליאור לסרי</option>
      <option>איציק עזרן</option>
      <option>אריאל אדרי</option>
    </select>
  </div>

  <div class="bg-white rounded-2xl p-6 shadow-sm">
    <label class="font-bold block mb-2">רשת</label>
    <div class="grid grid-cols-3 gap-3">
      <button onclick="this.classList.add('bg-primary','text-white')" class="border rounded-xl py-3 text-sm">מקס סטוק</button>
      <button onclick="this.classList.add('bg-primary','text-white')" class="border rounded-xl py-3 text-sm">ביג סטוק</button>
      <button onclick="this.classList.add('bg-primary','text-white')" class="border rounded-xl py-3 text-sm">דן דיל</button>
    </div>
  </div>

  <button onclick="alert('שודר בהצלחה!')" class="w-full bg-[#00288e] text-white py-5 rounded-2xl font-bold text-lg">שדר בזמן אמת למחסן</button>
</main>
</body>
</html>
